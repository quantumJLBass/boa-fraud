<svg
    xmlns:svg="http://www.w3.org/2000/svg"
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"
    x="0"
    y="0"
    width="100%"
    height="100%"
    preserveAspectRatio="xMinYMin"
    style="border: solid 1px black;"
    viewBox="0 0 500 800">
  <style>
    svg { background-color: white; }
    text { fill: #0D0D0D; word-wrap: break-word; }
    .year { font: bold 24px sans-serif; fill: #0D0D0D; }
    .event_date { font: 12px sans-serif; fill: #0D0D0D; }
    .title { font: bold 16px sans-serif; fill: #0D0D0D; }
    line, circle { stroke: black; fill: black; }
    .summary { font: 16px sans-serif; visibility: hidden; height: 0; transition: visibility 0.5s, height 0.5s; fill: #0D0D0D; background-color: black; }
    .flyout { cursor: pointer; transition: transform 0.5s cubic-bezier(.41,.01,0,.96); transform-origin: top left; }
    .flyout:hover { transform: scale(1.05);
    transform-origin:center top;}
    .flyout:hover .summary { visibility: visible; height: 60px; }
    rect { fill: white; stroke: black; }
    .sm {font-size: .75em; fill: #0D0D0D;}
    .animated-line {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw-line 0.5s cubic-bezier(.41,.01,0,.96) forwards;
    }

    @keyframes draw-line {
      to {
        stroke-dashoffset: 0;
      }
    }
    @media (prefers-color-scheme: dark) {
      svg { background-color: black; }
      text, .year, p.event_date, .title {fill: #F5F5F5; color:#F5F5F5 }
      .title { background-color: black; }
      .summary { background-color: white; }
      circle,line { stroke: white; }
      rect { stroke: white; fill: black; }
    }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Timeline -->
  <line x1="250" y1="50" x2="250" y2="750" />

  <!-- Years -->
  <text x="250" y="48" class="year" text-anchor="middle">2008</text>
  <line x1="240" y1="50" x2="260" y2="50" />
  <line x1="240" y1="750" x2="260" y2="750" />
  <text x="250" y="770" class="year" text-anchor="middle">2023</text>

  <!-- Tick marks and year labels -->
  <line x1="245" y1="97" x2="255" y2="97" />
  <text x="260" y="102" class="year sm">2009</text>
  <line x1="245" y1="143" x2="255" y2="143" />
  <text x="260" y="148" class="year sm">2010</text>
  <line x1="245" y1="190" x2="255" y2="190" />
  <text x="260" y="195" class="year sm">2011</text>
  <line x1="245" y1="237" x2="255" y2="237" />
  <text x="260" y="242" class="year sm">2012</text>
  <line x1="245" y1="283" x2="255" y2="283" />
  <text x="260" y="288" class="year sm">2013</text>
  <line x1="245" y1="330" x2="255" y2="330" />
  <text x="260" y="335" class="year sm">2014</text>
  <line x1="245" y1="377" x2="255" y2="377" />
  <text x="260" y="382" class="year sm">2015</text>
  <line x1="245" y1="423" x2="255" y2="423" />
  <text x="260" y="428" class="year sm">2016</text>
  <line x1="245" y1="470" x2="255" y2="470" />
  <text x="260" y="475" class="year sm">2017</text>
  <line x1="245" y1="517" x2="255" y2="517" />
  <text x="260" y="522" class="year sm">2018</text>
  <line x1="245" y1="563" x2="255" y2="563" />
  <text x="260" y="568" class="year sm">2019</text>
  <line x1="245" y1="610" x2="255" y2="610" />
  <text x="260" y="615" class="year sm">2020</text>
  <line x1="245" y1="657" x2="255" y2="657" />
  <text x="260" y="662" class="year sm">2021</text>
  <line x1="245" y1="703" x2="255" y2="703" />
  <text x="260" y="708" class="year sm">2022</text>

  <!-- event_date -->
  <circle cx="250" cy="150" r="5" />
  <line x1="250" y1="150" x2="295" y2="125" class="animated-line" />
  <g class="flyout">
    <rect x="295" y="110" width="200" height="30" />
    <foreignObject x="290" y="100" width="160" height="30">
      <body xmlns="http://www.w3.org/1999/xhtml">
        <p class="event_date"  style="filter: url(#shadow);">Nov. 10th</p>
      </body>
    </foreignObject>
    <foreignObject x="290" y="115" width="210" height="40">
      <body xmlns="http://www.w3.org/1999/xhtml">
        <p class="title" style="padding:0;margin:0;filter: url(#shadow);">A title of the event_date, a little long though</p>
      </body>
    </foreignObject>
    <rect x="295" y="175" width="200" height="60" class="summary" />
    <foreignObject x="305" y="180" width="160" height="60" class="summary">
      <body xmlns="http://www.w3.org/1999/xhtml">
        <p style="filter: url(#shadow);">A bit of the event_date summary is here and this would fall down or other CSS trick.</p>
        <a href="https://example.com" target="_blank" style="filter: url(#shadow);">Read more...</a>
      </body>
    </foreignObject>
    <!-- Line connecting the flyout to the timeline -->
  </g>

</svg>