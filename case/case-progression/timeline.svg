<svg xmlns="http://www.w3.org/2000/svg" width="500" height="800" viewBox="0 0 500 800">
  <style>
    .year { font: bold 24px sans-serif; }
    .event { font: 18px sans-serif; }
    .title { font: bold 20px sans-serif; }
  </style>

  <!-- Timeline -->
  <line x1="250" y1="50" x2="250" y2="750" stroke="black" />

  <!-- Years -->
  <text x="250" y="50" class="year" text-anchor="middle">2008</text>
  <text x="250" y="750" class="year" text-anchor="middle">2023</text>

  <!-- Events -->
  <circle cx="250" cy="150" r="5" fill="black" />
  <rect x="260" y="135" width="200" height="50" fill="white" stroke="black" />
  <text x="270" y="160" class="event">Event 1</text>
  <text x="270" y="185" class="title">Title 1</text>

  <circle cx="250" cy="300" r="5" fill="black" />
  <rect x="260" y="285" width="200" height="50" fill="white" stroke="black" />
  <text x="270" y="310" class="event">Event 2</text>
  <text x="270" y="335" class="title">Title 2</text>

  <circle cx="250" cy="450" r="5" fill="black" />
  <rect x="260" y="435" width="200" height="50" fill="white" stroke="black" />
  <text x="270" y="460" class="event">Event 3</text>
  <text x="270" y="485" class="title">Title 3</text>

  <circle cx="250" cy="600" r="5" fill="black" />
  <rect x="260" y="585" width="200" height="50" fill="white" stroke="black" />
  <text x="270" y="610" class="event">Event 4</text>
  <text x="270" y="635" class="title">Title 4</text>
</svg>